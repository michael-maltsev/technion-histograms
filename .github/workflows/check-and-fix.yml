name: Check and fix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

concurrency: check-and-fix

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install Python dependencies
        run: python -m pip install -r .github/requirements.txt
      - name: Set up Git config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: Cherry pick with fixes
        env:
          PROXY_SERVER_URL: ${{ secrets.PROXY_SERVER_URL }}
        run: |
          PROXY_ARG=""
          if [ -n "$PROXY_SERVER_URL" ]; then
            PROXY_SERVER=$(curl -sf "$PROXY_SERVER_URL")
            echo "::add-mask::$PROXY_SERVER"
            PROXY_ARG="--proxy-server=$PROXY_SERVER"
          fi
          python3 -u cherry_pick_with_fixes.py $PROXY_ARG
      - name: Check
        run: python3 -u checks.py
      - name: Commit and push fixes
        run: |
          git add .
          git diff-index --quiet HEAD || git commit -m "Automatic fixes by cherry_pick_with_fixes.py"
          git push
